name: Build stftPitchShift for Android (ReMandre)

on:
  workflow_dispatch:
  push:
    tags:
      - 'stftPitchShift-*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ANDROID_API: 30
      ABI: arm64-v8a
      ARCH: aarch64
      TRIPLE: aarch64-linux-android
      NDK_VERSION: r27c

    steps:
      # ─────────────────────────────────────────────
      # 1. Checkout
      # ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # 2. NDK
      # ─────────────────────────────────────────────
      - name: Install Android NDK ${{ env.NDK_VERSION }}
        run: |
          set -e
          NDK_ZIP="android-ndk-${NDK_VERSION}-linux.zip"
          wget -q "https://dl.google.com/android/repository/${NDK_ZIP}"
          unzip -q "${NDK_ZIP}"
          echo "NDK_ROOT=$PWD/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV
          echo "TOOLCHAIN=$PWD/android-ndk-${NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64" >> $GITHUB_ENV

      # ─────────────────────────────────────────────
      # 3. Host tools
      # ─────────────────────────────────────────────
      - name: Install host build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            wget git ca-certificates

      # ─────────────────────────────────────────────
      # 4. Clone stftPitchShift
      # ─────────────────────────────────────────────
      - name: Clone stftPitchShift
        run: |
          git clone --depth=1 https://github.com/jurihock/stftPitchShift.git stftPitchShift
          echo "=== stftPitchShift ===" && git -C stftPitchShift log --oneline -1

      # ─────────────────────────────────────────────
      # 5. Cross-compile env
      # ─────────────────────────────────────────────
      - name: Set cross-compile env
        run: |
          echo "CC=${TOOLCHAIN}/bin/${TRIPLE}${ANDROID_API}-clang"     >> $GITHUB_ENV
          echo "CXX=${TOOLCHAIN}/bin/${TRIPLE}${ANDROID_API}-clang++"  >> $GITHUB_ENV
          echo "AR=${TOOLCHAIN}/bin/llvm-ar"                           >> $GITHUB_ENV
          echo "RANLIB=${TOOLCHAIN}/bin/llvm-ranlib"                   >> $GITHUB_ENV
          echo "STRIP=${TOOLCHAIN}/bin/llvm-strip"                     >> $GITHUB_ENV
          echo "SYSROOT=${TOOLCHAIN}/sysroot"                          >> $GITHUB_ENV
          echo "PREFIX=$PWD/install"                                   >> $GITHUB_ENV

      # ─────────────────────────────────────────────
      # 6. Write C wrapper (ctypes-friendly API)
      # ─────────────────────────────────────────────
      - name: Write C wrapper
        run: |
          cat > stftPitchShift/capi.cpp << 'EOF'
          #include <cstdlib>
          #include <cstring>
          #include <cmath>
          #include <vector>
          #include "cpp/StftPitchShift/StftPitchShift.h"

          using namespace stftpitchshift;

          #define EXPORT __attribute__((visibility("default")))

          // --- Глобальные переменные для эффектов (Состояние) ---
          static std::vector<float> delay_buffer;
          static int delay_index = 0;
          static float osc_phase = 0.0f;

          extern "C" {

          // Очистка буферов при начале нового голосового сообщения
          EXPORT void reset_dsp() {
              delay_buffer.clear();
              delay_index = 0;
              osc_phase = 0.0f;
          }

          // Наш новый СВЕРХБЫСТРЫЙ процессор эффектов
          EXPORT void process_dsp(float* buffer, int length, int sample_rate, int effect_id) {
              // 0 = Без эффекта, 1 = Гелий (только питч), 2 = Бас (только питч)
              if (effect_id <= 2) return; 

              // Инициализация кольцевого буфера для эха (300 мс)
              int delay_samples = (int)(0.3f * sample_rate);
              if (delay_buffer.size() != delay_samples) {
                  delay_buffer.assign(delay_samples, 0.0f);
                  delay_index = 0;
              }

              // Шаги фазы для осцилляторов
              float phase_inc_robot = 2.0f * M_PI * 40.0f / sample_rate; // 40 Hz модуляция
              float phase_inc_ghost = 2.0f * M_PI * 3.0f / sample_rate;  // 3 Hz дрожание

              for (int i = 0; i < length; i++) {
                  float val = buffer[i];

                  // 3: Робот (Ring Modulation)
                  if (effect_id == 3) {
                      val *= std::sin(osc_phase);
                      osc_phase += phase_inc_robot;
                  }
                  // 5: Призрак (Тремоло)
                  else if (effect_id == 5) {
                      float tremolo = 0.5f + 0.5f * std::sin(osc_phase);
                      val *= tremolo;
                      osc_phase += phase_inc_ghost;
                  }

                  // 4, 5, 6: Эхо (Пещера, Призрак, Инопланетянин)
                  if (effect_id == 4 || effect_id == 5 || effect_id == 6) {
                      float echo_val = delay_buffer[delay_index];
                      val = val + echo_val * 0.5f; // Подмешиваем 50% эха
                      delay_buffer[delay_index] = val; // Записываем результат обратно (Feedback)
                      delay_index = (delay_index + 1) % delay_samples;
                  }

                  // Удерживаем фазу в пределах круга
                  if (osc_phase > 2.0f * M_PI) osc_phase -= 2.0f * M_PI;

                  // Жесткий лимитер (чтобы звук не трещал при наложении)
                  if (val > 1.0f) val = 1.0f;
                  else if (val < -1.0f) val = -1.0f;

                  buffer[i] = val;
              }
          }

          // --- Старые функции Pitch Shift ---
          EXPORT void stft_pitch_shift(const float* input, float* output, int length, double factor, int framesize, int hopsize, double samplerate) {
              std::vector<float> in(input, input + length);
              std::vector<float> out(length);
              StftPitchShift shifter(framesize, hopsize, samplerate);
              shifter.shiftpitch(in, out, factor);
              std::memcpy(output, out.data(), length * sizeof(float));
          }

          EXPORT const char* stft_version() {
              return "stftPitchShift-VoiceFX-2.0";
          }

          } // extern "C"
          EOF

      # ─────────────────────────────────────────────
      # 7. Patch CMakeLists — добавить capi в существующую библиотеку
      # ─────────────────────────────────────────────
      - name: Patch CMakeLists to build shared capi
        run: |
          cat >> stftPitchShift/CMakeLists.txt << 'EOF'

          # ── ReMandre ctypes wrapper ──────────────────────────────────────────
          if(BUILD_SHARED_LIBS)
            # Добавляем C-обёртку в уже существующую цель stftpitchshift
            # (VCPKG=ON + LibStftPitchShift.cmake уже создали её)
            target_sources(stftpitchshift PRIVATE capi.cpp)

            target_compile_features(stftpitchshift PRIVATE cxx_std_17)

            set_target_properties(stftpitchshift PROPERTIES
              CXX_VISIBILITY_PRESET hidden
              VISIBILITY_INLINES_HIDDEN ON)

            # Минимальный размер .so + статическая libstdc++
            target_link_libraries(stftpitchshift
              PRIVATE "-static-libstdc++ -Wl,--exclude-libs,ALL")
          endif()
          # ─────────────────────────────────────────────────────────────────────
          EOF

      # ─────────────────────────────────────────────
      # 8. Build shared .so
      # ─────────────────────────────────────────────
      - name: Build stftPitchShift (shared .so)
        run: |
          mkdir -p stftPitchShift/build
          cmake -S stftPitchShift -B stftPitchShift/build \
            -GNinja \
            -DCMAKE_TOOLCHAIN_FILE="${NDK_ROOT}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI="${ABI}" \
            -DANDROID_PLATFORM="android-${ANDROID_API}" \
            -DANDROID_STL="c++_static" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${PREFIX}" \
            -DBUILD_SHARED_LIBS=ON \
            -DVCPKG=ON \
            -DVCPKG=ON

          cmake --build stftPitchShift/build -- -j$(nproc)
          cmake --install stftPitchShift/build

      # ─────────────────────────────────────────────
      # 9. Inspect and strip .so
      # ─────────────────────────────────────────────
      - name: Inspect and strip .so
        run: |
          SO=$(find install/lib -name "libstftpitchshift*.so" | head -1)
          echo "Found: $SO"
          echo "Size before strip: $(du -sh $SO | cut -f1)"
          "${TOOLCHAIN}/bin/llvm-readelf" -d "$SO" | grep NEEDED
          ${STRIP} --strip-unneeded "$SO"
          echo "Size after strip: $(du -sh $SO | cut -f1)"
          cp "$SO" stftpitchshift.so
          echo "SO_PATH=$PWD/stftpitchshift.so" >> $GITHUB_ENV

      # ─────────────────────────────────────────────
      # 10. Get version
      # ─────────────────────────────────────────────
      - name: Get stftPitchShift version
        run: |
          # Пробуем взять из CMakeLists project(... VERSION x.x.x)
          VER=$(grep -oP 'project\s*\([^)]*VERSION\s+\K[0-9.]+' stftPitchShift/CMakeLists.txt | head -1)
          if [ -z "$VER" ]; then VER="git"; fi
          COMMIT=$(git -C stftPitchShift rev-parse --short HEAD)
          echo "LIB_VERSION=${VER}-${COMMIT}" >> $GITHUB_ENV

      # ─────────────────────────────────────────────
      # 11. Upload artifact
      # ─────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stftpitchshift-android-api${{ env.ANDROID_API }}-${{ env.ABI }}
          path: stftpitchshift.so
          retention-days: 30

      # ─────────────────────────────────────────────
      # 12. Create GitHub Release
      # ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "stftPitchShift-${{ env.LIB_VERSION }}"
          name: "stftPitchShift ${{ env.LIB_VERSION }} · Android API ${{ env.ANDROID_API }} arm64-v8a"
          body: |
            ## stftPitchShift — fat .so для ReMandre / exteragram

            | Параметр | Значение |
            |---|---|
            | Коммит | `${{ env.LIB_VERSION }}` |
            | Android API | ${{ env.ANDROID_API }} |
            | ABI | arm64-v8a |
            | Зависимости | статически слинкованы (header-only C++17) |
            | Внешние зависимости .so | только `libc`, `libm`, `libdl` |
