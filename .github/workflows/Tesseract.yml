name: Build Tesseract OCR for Android (ReMandre)

on:
  workflow_dispatch:
  push:
    tags:
      - 'Tesseract *'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_API: 30
      ABI: arm64-v8a
      ARCH: aarch64
      TRIPLE: aarch64-linux-android
      NDK_VERSION: r27c

    steps:
      # ─────────────────────────────────────────────
      # 1. Checkout (нужен только для наличия workflow)
      # ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # 2. Установка NDK
      # ─────────────────────────────────────────────
      - name: Install Android NDK ${{ env.NDK_VERSION }}
        run: |
          set -e
          NDK_ZIP="android-ndk-${NDK_VERSION}-linux.zip"
          wget -q "https://dl.google.com/android/repository/${NDK_ZIP}"
          unzip -q "${NDK_ZIP}"
          echo "NDK_ROOT=$PWD/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV
          echo "TOOLCHAIN=$PWD/android-ndk-${NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64" >> $GITHUB_ENV

      # ─────────────────────────────────────────────
      # 3. Зависимости хоста для сборки
      # ─────────────────────────────────────────────
      - name: Install host build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build pkg-config \
            autoconf automake libtool \
            wget git ca-certificates

      # ─────────────────────────────────────────────
      # 4. Клонируем ПОСЛЕДНИЕ исходники
      # ─────────────────────────────────────────────
      - name: Clone latest Leptonica
        run: |
          git clone --depth=1 https://github.com/DanBloomberg/leptonica.git leptonica

      - name: Clone latest Tesseract
        run: |
          git clone --depth=1 https://github.com/tesseract-ocr/tesseract.git tesseract

      - name: Print versions
        run: |
          echo "=== Leptonica ===" && git -C leptonica log --oneline -1
          echo "=== Tesseract  ===" && git -C tesseract  log --oneline -1

      # ─────────────────────────────────────────────
      # 5. Toolchain-переменные для cross-compile
      # ─────────────────────────────────────────────
      - name: Set cross-compile env
        run: |
          CLANG="${TOOLCHAIN}/bin/${TRIPLE}${ANDROID_API}-clang"
          CLANGPP="${TOOLCHAIN}/bin/${TRIPLE}${ANDROID_API}-clang++"
          AR="${TOOLCHAIN}/bin/llvm-ar"
          RANLIB="${TOOLCHAIN}/bin/llvm-ranlib"
          STRIP="${TOOLCHAIN}/bin/llvm-strip"

          echo "CC=$CLANG"        >> $GITHUB_ENV
          echo "CXX=$CLANGPP"     >> $GITHUB_ENV
          echo "AR=$AR"           >> $GITHUB_ENV
          echo "RANLIB=$RANLIB"   >> $GITHUB_ENV
          echo "STRIP=$STRIP"     >> $GITHUB_ENV
          echo "SYSROOT=${TOOLCHAIN}/sysroot" >> $GITHUB_ENV
          echo "PREFIX=$PWD/install" >> $GITHUB_ENV

      # ─────────────────────────────────────────────
      # 6. Собираем Leptonica (статически)
      # ─────────────────────────────────────────────
      - name: Build Leptonica (static)
        run: |
          mkdir -p leptonica/build && cd leptonica/build
          cmake .. \
            -GNinja \
            -DCMAKE_TOOLCHAIN_FILE="${NDK_ROOT}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI="${ABI}" \
            -DANDROID_PLATFORM="android-${ANDROID_API}" \
            -DANDROID_STL="c++_static" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${PREFIX}" \
            -DBUILD_SHARED_LIBS=OFF \
            -DENABLE_WEBP=OFF \
            -DENABLE_OPENJPEG=OFF \
            -DENABLE_GIF=OFF \
            -DENABLE_TIFF=OFF \
            -DENABLE_JPEG=OFF \
            -DENABLE_PNG=OFF \
            -DENABLE_ZLIB=OFF \
            -DENABLE_PROGRAMS=OFF
          ninja -j$(nproc)
          ninja install

      # ─────────────────────────────────────────────
      # 7. Собираем Tesseract как SHARED .so
      #    со статически влинкованными зависимостями
      # ─────────────────────────────────────────────
      - name: Build Tesseract (shared, fat .so)
        run: |
          mkdir -p tesseract/build && cd tesseract/build
          cmake .. \
            -GNinja \
            -DCMAKE_TOOLCHAIN_FILE="${NDK_ROOT}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI="${ABI}" \
            -DANDROID_PLATFORM="android-${ANDROID_API}" \
            -DANDROID_STL="c++_static" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${PREFIX}" \
            -DBUILD_SHARED_LIBS=ON \
            -DLeptonica_DIR="${PREFIX}/lib/cmake/leptonica" \
            -DCMAKE_FIND_ROOT_PATH="${PREFIX}" \
            -DBUILD_TRAINING_TOOLS=OFF \
            -DINSTALL_CONFIGS=OFF \
            -DGRAPHICS_DISABLED=ON \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libstdc++" \
            -DCMAKE_SHARED_LINKER_FLAGS="-static-libstdc++ -Wl,--exclude-libs,ALL"
          ninja -j$(nproc)
          ninja install

      # ─────────────────────────────────────────────
      # 8. Проверяем .so и убираем лишние символы
      # ─────────────────────────────────────────────
      - name: Inspect and strip .so
        run: |
          SO=$(find install/lib -name "libtesseract*.so" | head -1)
          echo "Found: $SO"
          echo "Size before strip: $(du -sh $SO | cut -f1)"

          # Показываем внешние зависимости (должны быть только system libs)
          "${TOOLCHAIN}/bin/llvm-readelf" -d "$SO" | grep NEEDED

          # Strip debug symbols (оставляем export table)
          ${STRIP} --strip-unneeded "$SO"
          echo "Size after strip: $(du -sh $SO | cut -f1)"

          # Переименовываем в tesseract.so (как ожидает ReMandre по __ReqRements__)
          cp "$SO" tesseract.so
          echo "SO_PATH=$PWD/tesseract.so" >> $GITHUB_ENV

      # ─────────────────────────────────────────────
      # 9. Получаем версию Tesseract для тега релиза
      # ─────────────────────────────────────────────
      - name: Get Tesseract version
        run: |
          VER=$(grep -m1 'project.*VERSION' tesseract/CMakeLists.txt \
                | grep -oP '\d+\.\d+\.\d+' | head -1 || echo "git")
          COMMIT=$(git -C tesseract rev-parse --short HEAD)
          echo "TESS_VERSION=${VER}-${COMMIT}" >> $GITHUB_ENV
          echo "TAG=Tesseract ${VER}-${COMMIT}" >> $GITHUB_ENV

      # ─────────────────────────────────────────────
      # 10. Upload artifact (для отладки без релиза)
      # ─────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tesseract-android-api${{ env.ANDROID_API }}-${{ env.ABI }}
          path: tesseract.so
          retention-days: 30

      # ─────────────────────────────────────────────
      # 11. Создаём GitHub Release с тегом "Tesseract X.Y.Z"
      # ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "Tesseract ${{ env.TESS_VERSION }}"
          name: "Tesseract OCR ${{ env.TESS_VERSION }} · Android API ${{ env.ANDROID_API }} arm64-v8a"
          body: |
            ## Tesseract OCR — fat .so для ReMandre / exteragram

            | Параметр | Значение |
            |---|---|
            | Tesseract commit | `${{ env.TESS_VERSION }}` |
            | Android API | ${{ env.ANDROID_API }} |
            | ABI | arm64-v8a |
            | Зависимости | статически слинкованы внутри .so |
            | Внешние зависимости | только `libc`, `libm`, `libdl` (Android system) |

            ### Как использовать в плагине (ReMandre)

            ```python
            __ReqRements__ = {
                "tesseract": "https://github.com/<ВАШ_ЮЗЕР>/<ВАШ_РЕПО>/releases/latest/download/tesseract.so - Tesseract OCR engine"
            }
            ```

            Затем в коде плагина:
            ```python
            from remandre import ReLoad
            import ctypes

            loader = ReLoad.get()
            lib = loader.loaded_modules["tesseract"]   # ctypes.CDLL объект
            # или вручную:
            # lib = ctypes.CDLL(os.path.join(loader.root, "tesseract.so"))
            ```

            > Файл кладётся в `files/remandre_modules/tesseract.so` автоматически при первом запуске плагина.
          files: tesseract.so
          generate_release_notes: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
