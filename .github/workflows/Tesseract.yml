name: Build Tesseract OCR

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release Tag Name'
        required: true
        default: 'Tesseract-latest'

env:
  OUTPUT_DIR: ${{ github.workspace }}/output
  TRIPLET_NAME: arm64-android-static
  TARGET_API: 30

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - run: mkdir -p ${{ env.OUTPUT_DIR }}

      - uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg
            ~/.cache/vcpkg
          key: ${{ runner.os }}-vcpkg-tess-${{ hashFiles('**/*.yml') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-tess-

      - run: |
          if [ ! -d "${{ github.workspace }}/vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg.git ${{ github.workspace }}/vcpkg
            cd ${{ github.workspace }}/vcpkg
            ./bootstrap-vcpkg.sh -disableMetrics
          fi

      - run: |
          mkdir -p project/custom-triplets
          cd project
          
          cat << EOF > vcpkg.json
          {
            "name": "tesseract-android",
            "version": "1.0.0",
            "dependencies": [
              {
                "name": "tesseract",
                "default-features": false
              }
            ]
          }
          EOF
          
          cat << EOF > custom-triplets/${{ env.TRIPLET_NAME }}.cmake
          set(VCPKG_TARGET_ARCHITECTURE arm64)
          set(VCPKG_CRT_LINKAGE dynamic)
          set(VCPKG_LIBRARY_LINKAGE static)
          set(VCPKG_CMAKE_SYSTEM_NAME Android)
          set(VCPKG_CMAKE_SYSTEM_VERSION ${{ env.TARGET_API }})
          set(VCPKG_CHAINLOAD_TOOLCHAIN_FILE "${ANDROID_NDK_LATEST_HOME}/build/cmake/android.toolchain.cmake")
          EOF
          
          ${{ github.workspace }}/vcpkg/vcpkg install --triplet ${{ env.TRIPLET_NAME }} --overlay-triplets=custom-triplets

      - run: |
          NDK_BIN="$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          CXX="$NDK_BIN/aarch64-linux-android${{ env.TARGET_API }}-clang++"
          STRIP="$NDK_BIN/llvm-strip"
          
          LIB_DIR="project/vcpkg_installed/${{ env.TRIPLET_NAME }}/lib"
          STATIC_LIBS=$(find "$LIB_DIR" -maxdepth 1 -name "*.a" -print)
          
          if [ -z "$STATIC_LIBS" ]; then
            exit 1
          fi
          
          FINAL_SO="${{ env.OUTPUT_DIR }}/libtesseract.so"
          
          $CXX -shared -fPIC -Wl,-soname,libtesseract.so \
            -Wl,--whole-archive $STATIC_LIBS -Wl,--no-whole-archive \
            -static-libstdc++ \
            -llog -lz -lm -landroid \
            -o "$FINAL_SO"
            
          $STRIP --strip-unneeded "$FINAL_SO"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_tag }}
          files: ${{ env.OUTPUT_DIR }}/libtesseract.so
          fail_on_unmatched_files: true
          generate_release_notes: true
