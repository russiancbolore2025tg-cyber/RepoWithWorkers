import ctypes
import os
from java import jclass
from java.nio import ByteBuffer
from android.graphics import BitmapFactory, Bitmap
from remandre import ReLoad

# --- 1. Настраиваем обертку C API через ctypes ---
def setup_tesseract_api(lib):
    # void* TessBaseAPICreate()
    lib.TessBaseAPICreate.restype = ctypes.c_void_p
    
    # int TessBaseAPIInit3(void* handle, const char* datapath, const char* language)
    lib.TessBaseAPIInit3.argtypes = [ctypes.c_void_p, ctypes.c_char_p, ctypes.c_char_p]
    lib.TessBaseAPIInit3.restype = ctypes.c_int
    
    # void TessBaseAPISetImage(void* handle, const unsigned char* imagedata, int width, int height, int bytes_per_pixel, int bytes_per_line)
    lib.TessBaseAPISetImage.argtypes = [ctypes.c_void_p, ctypes.c_char_p, ctypes.c_int, ctypes.c_int, ctypes.c_int, ctypes.c_int]
    
    # char* TessBaseAPIGetUTF8Text(void* handle)
    lib.TessBaseAPIGetUTF8Text.argtypes = [ctypes.c_void_p]
    lib.TessBaseAPIGetUTF8Text.restype = ctypes.POINTER(ctypes.c_char)
    
    # void TessDeleteText(char* text)
    lib.TessDeleteText.argtypes = [ctypes.POINTER(ctypes.c_char)]
    
    # void TessBaseAPIDelete(void* handle)
    lib.TessBaseAPIDelete.argtypes = [ctypes.c_void_p]

# --- 2. Функция распознавания ---
def recognize_text(image_path: str, tessdata_dir: str, lang: str = "rus+eng") -> str:
    loader = ReLoad.get()
    tess_lib = loader.loaded_modules.get("tesseract")
    if not tess_lib:
        return "Ошибка: модуль Tesseract не загружен!"
        
    setup_tesseract_api(tess_lib)
    
    # Декодируем картинку средствами Android
    bmp = BitmapFactory.decodeFile(image_path)
    if not bmp:
        return "Ошибка: не удалось прочитать картинку"
        
    # Приводим к формату ARGB_8888 (4 байта на пиксель)
    bmp = bmp.copy(Bitmap.Config.ARGB_8888, False)
    w, h = bmp.getWidth(), bmp.getHeight()
    bytes_per_pixel = 4
    bytes_per_line = w * bytes_per_pixel
    
    # Вытаскиваем сырые байты пикселей через Chaquopy
    buffer = ByteBuffer.allocate(bmp.getByteCount())
    bmp.copyPixelsToBuffer(buffer)
    raw_pixels = bytes(buffer.array()) # Конвертируем Java byte[] в Python bytes
    
    # Создаем экземпляр Tesseract
    api_handle = tess_lib.TessBaseAPICreate()
    
    try:
        # Инициализируем (datapath — это путь к родительской папке папки tessdata)
        # Например, если файл лежит в /data/.../files/tessdata/rus.traineddata,
        # то datapath должен быть "/data/.../files/"
        init_res = tess_lib.TessBaseAPIInit3(
            api_handle, 
            tessdata_dir.encode('utf-8'), 
            lang.encode('utf-8')
        )
        
        if init_res != 0:
            return "Ошибка: не удалось инициализировать Tesseract (проверьте .traineddata)"
            
        # Передаем сырые пиксели
        tess_lib.TessBaseAPISetImage(
            api_handle, 
            raw_pixels, 
            w, h, 
            bytes_per_pixel, 
            bytes_per_line
        )
        
        # Получаем текст
        text_ptr = tess_lib.TessBaseAPIGetUTF8Text(api_handle)
        if text_ptr:
            # Читаем Си-строку до нулевого байта
            result_text = ctypes.cast(text_ptr, ctypes.c_char_p).value.decode('utf-8')
            # Обязательно освобождаем память, выделенную Tesseract!
            tess_lib.TessDeleteText(text_ptr)
            return result_text.strip()
        return ""
        
    finally:
        # Уничтожаем инстанс (освобождаем память)
        tess_lib.TessBaseAPIDelete(api_handle)
