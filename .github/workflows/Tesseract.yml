name: Build Tesseract OCR

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release Tag Name'
        required: true
        default: 'Tesseract-latest'

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  OUTPUT_DIR: ${{ github.workspace }}/output
  TRIPLET_NAME: arm64-android
  TARGET_API: 30

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - run: mkdir -p ${{ env.OUTPUT_DIR }}

      - name: Set Android NDK Env
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_ROOT }}/installed
            ${{ env.VCPKG_ROOT }}/downloads
            ~/.cache/vcpkg
          key: ${{ runner.os }}-vcpkg-tess-core-${{ hashFiles('**/*.yml') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-tess-core-

      - run: |
          if [ ! -d "${{ env.VCPKG_ROOT }}" ]; then
            git clone https://github.com/microsoft/vcpkg.git ${{ env.VCPKG_ROOT }}
          fi
          cd ${{ env.VCPKG_ROOT }}
          ./bootstrap-vcpkg.sh -disableMetrics

      - run: |
          TRIPLET_DIR="${{ env.VCPKG_ROOT }}/custom-triplets"
          mkdir -p "$TRIPLET_DIR"
          
          cat << EOF > "$TRIPLET_DIR/${{ env.TRIPLET_NAME }}.cmake"
          set(VCPKG_TARGET_ARCHITECTURE arm64)
          set(VCPKG_CRT_LINKAGE dynamic)
          set(VCPKG_LIBRARY_LINKAGE static)
          set(VCPKG_CMAKE_SYSTEM_NAME Android)
          set(VCPKG_CMAKE_SYSTEM_VERSION ${{ env.TARGET_API }})
          set(VCPKG_ENV_PASSTHROUGH ANDROID_NDK_HOME)
          EOF

      - run: |
          cd ${{ env.VCPKG_ROOT }}
          ./vcpkg install "tesseract[core]:${{ env.TRIPLET_NAME }}" --head --overlay-triplets=custom-triplets

      - run: |
          NDK_BIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          CXX="$NDK_BIN/aarch64-linux-android${{ env.TARGET_API }}-clang++"
          STRIP="$NDK_BIN/llvm-strip"
          
          LIB_DIR="${{ env.VCPKG_ROOT }}/installed/${{ env.TRIPLET_NAME }}/lib"
          STATIC_LIBS=$(find "$LIB_DIR" -maxdepth 1 -name "*.a" -print)
          
          if [ -z "$STATIC_LIBS" ]; then
            exit 1
          fi
          
          FINAL_SO="${{ env.OUTPUT_DIR }}/libtesseract.so"
          
          $CXX -shared -fPIC -Wl,-soname,libtesseract.so \
            -Wl,--whole-archive $STATIC_LIBS -Wl,--no-whole-archive \
            -static-libstdc++ \
            -llog -lz -lm -landroid \
            -o "$FINAL_SO"
            
          $STRIP --strip-unneeded "$FINAL_SO"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_tag }}
          files: ${{ env.OUTPUT_DIR }}/libtesseract.so
          fail_on_unmatched_files: true
          generate_release_notes: true
